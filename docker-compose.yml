services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: snapmed-pharmacv-api:local
    ports:
      - "${HOST_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
